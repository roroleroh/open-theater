<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ares Open Theater</title>
    <style>
        /* Inlined so the screen surface is visible even before the JS bundle
           runs — this doubles as a render-pipeline check: if you can see this
           card projected on the screen in-world, the DUI texture path works. */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #idle {
            position: fixed; inset: 0; z-index: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 35%, #1b2735 0%, #090a0f 75%);
            font-family: Arial, Helvetica, sans-serif; color: #e8eef7;
        }
        #idle .title { font-size: 8vw; font-weight: 800; letter-spacing: 0.06em; }
        #idle .sub { margin-top: 2vh; font-size: 3vw; opacity: 0.7; }
        #root { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="idle">
        <div>
            <div class="title">OPEN THEATER</div>
            <div class="sub">Ready — set a URL to play</div>
        </div>
    </div>
    <div id="root"></div>
</body>
</html>
